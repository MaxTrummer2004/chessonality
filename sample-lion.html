<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lion Icon Sample</title>
  <style>
    body {
      background: #0f1419;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      gap: 50px;
      flex-wrap: wrap;
      padding: 40px;
    }
    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .label {
      color: #888;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
    }
  </style>
</head>
<body>

<div class="card">
  <svg width="96" height="96" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <!-- Mane -->
    <ellipse cx="32" cy="36" rx="26" ry="24" fill="#B45309" stroke="#000" stroke-width="2"/>
    <ellipse cx="32" cy="34" rx="23" ry="21" fill="#D97706" stroke="#000" stroke-width="1.5"/>
    <!-- Face -->
    <ellipse cx="32" cy="36" rx="16" ry="17" fill="#FBBF24" stroke="#000" stroke-width="1.5"/>
    <!-- Eyes -->
    <ellipse cx="25" cy="32" rx="3.5" ry="3" fill="#fff" stroke="#000" stroke-width="1"/>
    <ellipse cx="39" cy="32" rx="3.5" ry="3" fill="#fff" stroke="#000" stroke-width="1"/>
    <circle cx="26" cy="32" r="2" fill="#1a1a2e"/>
    <circle cx="40" cy="32" r="2" fill="#1a1a2e"/>
    <circle cx="25.5" cy="31.2" r="0.8" fill="#fff"/>
    <circle cx="39.5" cy="31.2" r="0.8" fill="#fff"/>
    <!-- Nose -->
    <path d="M30,39 Q32,42 34,39 Q32,40.5 30,39Z" fill="#92400E" stroke="#000" stroke-width="0.8"/>
    <!-- Mouth -->
    <path d="M28,42 Q32,46 36,42" stroke="#000" stroke-width="1" fill="none" stroke-linecap="round"/>
    <!-- Ears -->
    <circle cx="14" cy="20" r="6" fill="#D97706" stroke="#000" stroke-width="1.5"/>
    <circle cx="14" cy="20" r="3" fill="#FBBF24" stroke="#000" stroke-width="0.8"/>
    <circle cx="50" cy="20" r="6" fill="#D97706" stroke="#000" stroke-width="1.5"/>
    <circle cx="50" cy="20" r="3" fill="#FBBF24" stroke="#000" stroke-width="0.8"/>
  </svg>
  <div class="label">96px</div>
</div>

<div class="card">
  <svg width="48" height="48" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="32" cy="36" rx="26" ry="24" fill="#B45309" stroke="#000" stroke-width="2"/>
    <ellipse cx="32" cy="34" rx="23" ry="21" fill="#D97706" stroke="#000" stroke-width="1.5"/>
    <ellipse cx="32" cy="36" rx="16" ry="17" fill="#FBBF24" stroke="#000" stroke-width="1.5"/>
    <ellipse cx="25" cy="32" rx="3.5" ry="3" fill="#fff" stroke="#000" stroke-width="1"/>
    <ellipse cx="39" cy="32" rx="3.5" ry="3" fill="#fff" stroke="#000" stroke-width="1"/>
    <circle cx="26" cy="32" r="2" fill="#1a1a2e"/>
    <circle cx="40" cy="32" r="2" fill="#1a1a2e"/>
    <circle cx="25.5" cy="31.2" r="0.8" fill="#fff"/>
    <circle cx="39.5" cy="31.2" r="0.8" fill="#fff"/>
    <path d="M30,39 Q32,42 34,39 Q32,40.5 30,39Z" fill="#92400E" stroke="#000" stroke-width="0.8"/>
    <path d="M28,42 Q32,46 36,42" stroke="#000" stroke-width="1" fill="none" stroke-linecap="round"/>
    <circle cx="14" cy="20" r="6" fill="#D97706" stroke="#000" stroke-width="1.5"/>
    <circle cx="14" cy="20" r="3" fill="#FBBF24" stroke="#000" stroke-width="0.8"/>
    <circle cx="50" cy="20" r="6" fill="#D97706" stroke="#000" stroke-width="1.5"/>
    <circle cx="50" cy="20" r="3" fill="#FBBF24" stroke="#000" stroke-width="0.8"/>
  </svg>
  <div class="label">48px</div>
</div>

<div class="card">
  <svg width="24" height="24" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="32" cy="36" rx="26" ry="24" fill="#B45309" stroke="#000" stroke-width="2"/>
    <ellipse cx="32" cy="34" rx="23" ry="21" fill="#D97706" stroke="#000" stroke-width="1.5"/>
    <ellipse cx="32" cy="36" rx="16" ry="17" fill="#FBBF24" stroke="#000" stroke-width="1.5"/>

    <ellipse cx="39" cy="32" rx="3.5" ry="3" fill="#fff" stroke="#000" stroke-width="1"/>

    <circle cx="14" cy="20" r="6" fill="#D97706" stroke="#000" stroke-width="1.5"/>

</body>
</html>
